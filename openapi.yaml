  /proxy/regions/resolve:
    get:
      summary: Resolve region names from one or more region ids
      tags: [Region Lookup]
      description: |
        Cocok saat frontend sudah memegang ID wilayah dari payload lain dan hanya perlu
        nama tampilannya.
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: provinsi_id
          schema:
            type: string
          example: '14'
        - in: query
          name: kabupaten_id
          schema:
            type: string
          example: '1410'
        - in: query
          name: kecamatan_id
          schema:
            type: string
          example: '1410010'
        - in: query
          name: kelurahan_id
          schema:
            type: string
          example: '1410010001'
      responses:
        '200':
          description: Resolved region names for the provided ids
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegionResolveResponse'
              examples:
                resolveAllLevels:
                  summary: Resolve nama seluruh level wilayah
                  value:
                    status: true
                    message: Nama wilayah berhasil di-resolve
                    data:
                      provinsi_nama: Riau
                      kabupaten_nama: Kepulauan Meranti
                      kecamatan_nama: Tebing Tinggi
                      kelurahan_nama: Selatpanjang Kota
        '401':
          description: No session cookie or revoked session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Invalid or expired session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Region resolve failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
